<!DOCTYPE html>
<html>
<head>
    <title>DeepParallel - AI Content Pipeline</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            max-width: 600px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .tagline {
            font-size: 1.5rem;
            opacity: 0.95;
            margin-bottom: 2rem;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .feature:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(255,255,255,0.2);
        }
        .status {
            background: linear-gradient(45deg, #00d084, #00a06b);
            display: inline-block;
            padding: 0.75rem 2rem;
            border-radius: 25px;
            margin-top: 2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,208,132,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 4px 15px rgba(0,208,132,0.3); }
            50% { box-shadow: 0 4px 25px rgba(0,208,132,0.5); }
            100% { box-shadow: 0 4px 15px rgba(0,208,132,0.3); }
        }
        .api-endpoints {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .endpoint {
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            margin: 0.5rem;
            display: inline-block;
            font-family: monospace;
        }
        .cta {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .cta:hover {
            background: white;
            color: #764ba2;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 DeepParallel</h1>
        <p class="tagline">AI-Powered Content Generation Pipeline</p>
        
        <div class="features">
            <div class="feature">
                <h3>⚡ Fast</h3>
                <p>Lightning-speed generation</p>
            </div>
            <div class="feature">
                <h3>🎨 Creative</h3>
                <p>AI-driven solutions</p>
            </div>
            <div class="feature">
                <h3>📈 Scalable</h3>
                <p>Enterprise-ready</p>
            </div>
            <div class="feature">
                <h3>🔒 Secure</h3>
                <p>Google Cloud powered</p>
            </div>
        </div>
        
        <div class="status">✅ System Online</div>
        
        <div class="api-endpoints">
            <h3>API Endpoints</h3>
            <div class="endpoint">/api/generate</div>
            <div class="endpoint">/api/status</div>
            <div class="endpoint">/api/health</div>
        </div>
        
        <a href="mailto:mike@michaelcrowemycology.com" class="cta">Get API Access</a>
    </div>
</body>
</html>
